services:
  - type: web
    name: imperia-guild-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: "8080"
    plan: free
    healthCheckPath: /
